<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gesture Race</title>
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">

    <div id="race-area">

      <!-- Lane 1 -->
      <div class="lane" id="lane-p1">
        <div class="lane-header">
          <span class="player-label p1">Joueur 1</span>
          <span class="timer" id="timer-1">00:00.0</span>
        </div>
        <div class="track" id="track-1">
          <div class="track-bg"></div>
          <div class="finish-line"></div>
          <div class="horse" id="horse-1">🏇</div>
        </div>
        <div class="sign-row">
          <div class="sign-queue" id="queue-1"></div>
          <div class="sign-status" id="status-1">— en attente</div>
        </div>
      </div>

      <div class="lane-divider"></div>

      <!-- Lane 2 -->
      <div class="lane" id="lane-p2">
        <div class="lane-header">
          <span class="player-label p2">Joueur 2</span>
          <span class="timer" id="timer-2">00:00.0</span>
        </div>
        <div class="track" id="track-2">
          <div class="track-bg"></div>
          <div class="finish-line"></div>
          <div class="horse" id="horse-2">🏇</div>
        </div>
        <div class="sign-row">
          <div class="sign-queue" id="queue-2"></div>
          <div class="sign-status" id="status-2">— en attente</div>
        </div>
      </div>

    </div>

    <div id="webcam-area">
      <div id="camera-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
        <div id="cam-status">
          <span class="dot" id="cam-dot"></span>
          <span id="cam-label">Connexion webcam...</span>
        </div>
      </div>
      <div id="webcam-info">
        <div class="hand-label p1">← Joueur 1</div>
        <div class="hand-label p2">Joueur 2 →</div>
      </div>
    </div>

    <div id="winner-banner">
      <div id="winner-text"></div>
      <button id="restart-btn">Rejouer</button>
    </div>

  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
