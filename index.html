<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gesture Race</title>
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">

    <div id="race-area">

      <div id="race-header">
        <div id="circuit-badge"></div>
        <div id="best-score-row">Meilleur Score : <span id="best-score-display">--.-s</span></div>
      </div>

      <!-- Lane 1 -->
      <div class="lane" id="lane-p1">
        <div class="lane-header">
          <div class="player-info">
            <img class="player-avatar" id="avatar-p1" alt="">
            <span class="player-label p1" id="name-p1" contenteditable="true" spellcheck="false">Joueur 1</span>
          </div>
          <span class="timer" id="timer-1">00:00.0</span>
        </div>
        <div class="track" id="track-1">
          <div class="track-bg"></div>
          <div class="finish-line"></div>
          <div class="horse" id="horse-1">🏇</div>
        </div>
        <div class="sign-row">
          <div class="sign-queue" id="queue-1"></div>
          <div class="sign-status" id="status-1">— en attente</div>
        </div>
      </div>

      <div class="lane-divider"></div>

      <!-- Lane 2 -->
      <div class="lane" id="lane-p2">
        <div class="lane-header">
          <div class="player-info">
            <img class="player-avatar" id="avatar-p2" alt="">
            <span class="player-label p2" id="name-p2" contenteditable="true" spellcheck="false">Joueur 2</span>
          </div>
          <span class="timer" id="timer-2">00:00.0</span>
        </div>
        <div class="track" id="track-2">
          <div class="track-bg"></div>
          <div class="finish-line"></div>
          <div class="horse" id="horse-2">🏇</div>
        </div>
        <div class="sign-row">
          <div class="sign-queue" id="queue-2"></div>
          <div class="sign-status" id="status-2">— en attente</div>
        </div>
      </div>

    </div>

    <div id="webcam-area">
      <div id="camera-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
        <canvas id="three-canvas"></canvas>
        <div id="cam-status">
          <span class="dot" id="cam-dot"></span>
          <span id="cam-label">Connexion webcam...</span>
        </div>
      </div>
      <div id="webcam-info">
        <div class="hand-label p1">← Joueur 1</div>
        <div class="hand-label p2">Joueur 2 →</div>
      </div>
    </div>

    <div id="buzzer-overlay">
      <div id="char-pickers"></div>
      <button id="buzzer-btn">BUZZER</button>
    </div>

    <div id="countdown-overlay">
      <div id="countdown-number"></div>
    </div>

    <div id="mode-screen">
      <h1>Gesture Race</h1>

      <div class="screen-section">
        <h2 class="section-title">Circuit</h2>
        <div class="diff-cards">
          <button class="diff-card" data-diff="easy">
            <span class="diff-icon">🌿</span>
            <span class="diff-name">Prairie</span>
            <span class="diff-meta">12 gestes</span>
            <span class="diff-label">Facile</span>
          </button>
          <button class="diff-card active" data-diff="normal">
            <span class="diff-icon">🏙️</span>
            <span class="diff-name">Urbain</span>
            <span class="diff-meta">20 gestes</span>
            <span class="diff-label">Normal</span>
          </button>
          <button class="diff-card" data-diff="hard">
            <span class="diff-icon">🚀</span>
            <span class="diff-name">Espace</span>
            <span class="diff-meta">35 gestes</span>
            <span class="diff-label">Difficile</span>
          </button>
        </div>
      </div>

      <div class="screen-section">
        <h2 class="section-title">Mode</h2>
        <div class="mode-buttons">
          <button class="mode-btn" id="btn-solo">Solo</button>
          <button class="mode-btn" id="btn-duo">2 Joueurs</button>
        </div>
      </div>
    </div>

    <div id="winner-banner">
      <div id="winner-text"></div>
      <div id="result-cam-slot"></div>
      <div id="loser-text"></div>
      <div id="result-best-score">Meilleur Score : <span id="result-best-score-display">--.-s</span></div>
      <button id="restart-btn">Rejouer</button>
    </div>

  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
